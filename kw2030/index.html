<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://dhlife09.github.io/kw2030/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        var version = "1.0";
        var script_baseurl = "https://dhlife09.github.io/kw2030/scripts/";
        var scripts = [
            "map_v" + version + ".js",
            "marker_v" + version + ".js",
            "location_v" + version + ".js",
            "experience_v" + version + ".js",
            "tnp_v" + version + ".js",
            "items_v" + version + ".js",
        ];

        function loadScripts(index) {            
            var script = document.createElement("script");
            script.src = script_baseurl + scripts[index];
            document.body.appendChild(script);
        }

        document.getElementById('this_version').innerText = String(version);
    </script>
    <title>여기요 - 광운대학교</title>
</head>

<body>
    <!-- A grey horizontal navbar that becomes vertical on small screens -->
    <nav class="navbar navbar-expand-sm bg-light">
        <!-- Links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" style="color: #751f2a;">
                    <div class="container">
                      <div class="row align-items-center">
                        <div class="col-xs-8">
                          <span class="mt-2" style="font-size: 14px;">여기요</span>
                          <span class="mt-2" style="font-size: 5px;" id="this_version">version</span>
                          <br>
                          <span class="mt-2" style="font-size: 24px;">광운대학교</span>
                        </div>
                        <div class="col-xs-2">
                          <img src="https://dhlife09.github.io/kw2030/images/character.png" width="60" height="60">
                        </div>
                      </div>
                    </div>
                </a>
            </li>
        </ul>
    </nav>
    <div id="map" style="width:100%;height:380px;"></div>
    <ul class="list-group" id="restaurant-list">
        <li class="list-group-item">식당리스트가 아래에 표시됩니다.</li>
    </ul>

    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0b63be1723efd93b624c4b4cabc3e7dd"></script>
        
    <!-- custom scripts here -->
    <script>
            for (var i = 0; i < Object.keys(scripts).length; i++) {    loadScripts(i); }
    </script>
    <!-- custom scripts end  -->
</body>

</html>
